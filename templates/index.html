<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="brand">
            <i class="fas fa-video me-2"></i> VidGen AI
        </div>

        <a href="#" class="new-video-btn" id="newVideoBtn">
            <i class="fas fa-plus me-2"></i> New Video
        </a>

        <div class="nav-section">
            <h5>Recent Projects</h5>
        </div>
        <div class="recent-projects" id="recentProjectsList">
            <div class="project-item" style="opacity:0.5;">
                <div class="thumbnail" style="background: #2b2b3a;"></div>
                <div class="info">
                    <div class="title">No projects yet</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Panel -->
    <div class="main-content">
        <!-- Video Preview -->
        <div class="preview-area" id="previewArea">
            <div class="text-center w-100">
                <div id="videoContainer" style="display:none;">
                    <video id="videoPlayer" controls style="width:100%; max-height: 70vh;" poster="https://via.placeholder.com/800x450.png?text=Your+Video+Will+Appear+Here">
                        Your browser does not support the video tag.
                    </video>
                </div>
                <div id="placeholder" class="placeholder-text">
                    <i class="fas fa-film fa-3x mb-3 d-block"></i>
                    Enter a prompt below to create your video.
                </div>
                <div id="loadingSpinner" class="loading-spinner">
                    <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
                        <span class="visually-hidden">Generating video...</span>
                    </div>
                    <p class="mt-2">Generating your video... This may take a minute.</p>
                </div>
                <div id="statusMessage" class="status-message">
                    <span id="statusText"></span>
                </div>
            </div>
        </div>

        <!-- Input Form -->
        <div class="input-form">
            <form id="videoForm">
                <div class="mb-3">
                    <label for="promptInput" class="form-label">What video do you want to create?</label>
                    <textarea class="form-control prompt-input" id="promptInput" rows="2" placeholder="e.g., Create a 30-second motivational video about perseverance..." required></textarea>
                </div>
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                    <button type="submit" class="btn btn-generate" id="generateBtn">
                        <i class="fas fa-magic me-2"></i> Generate Video
                    </button>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="keepAspect" checked>
                        <label class="form-check-label" for="keepAspect">9:16 vertical (TikTok / Reels)</label>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE = ''; // Adjust to your backend base URL, e.g., '/api' or ''
        let currentJobId = null;
        let pollingInterval = null;

        // DOM references
        const videoForm = document.getElementById('videoForm');
        const promptInput = document.getElementById('promptInput');
        const generateBtn = document.getElementById('generateBtn');
        const placeholder = document.getElementById('placeholder');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const statusMessage = document.getElementById('statusMessage');
        const statusText = document.getElementById('statusText');
        const videoContainer = document.getElementById('videoContainer');
        const videoPlayer = document.getElementById('videoPlayer');
        const recentProjectsList = document.getElementById('recentProjectsList');
        const newVideoBtn = document.getElementById('newVideoBtn');

        // ---------- Recent Projects Logic ----------
        function loadRecentProjects() {
            // In a real app, fetch from /api/projects. For now, render empty state.
            const projects = [];
            renderProjects(projects);
        }

        function renderProjects(projects) {
            if (!projects.length) {
                recentProjectsList.innerHTML = `
                    <div class="project-item" style="opacity:0.5;">
                        <div class="thumbnail" style="background: #2b2b3a;"></div>
                        <div class="info">
                            <div class="title">No projects yet</div>
                        </div>
                    </div>`;
                return;
            }
            let html = '';
            projects.forEach(p => {
                html += `
                <div class="project-item" data-id="${p.id}">
                    <img class="thumbnail" src="${p.thumbnail || 'https://via.placeholder.com/40'}" alt="thumbnail">
                    <div class="info">
                        <div class="title">${p.title}</div>
                        <div class="date">${p.created}</div>
                    </div>
                </div>`;
            });
            recentProjectsList.innerHTML = html;
            document.querySelectorAll('.project-item[data-id]').forEach(item => {
                item.addEventListener('click', function(e) {
                    const id = this.getAttribute('data-id');
                    if (id) loadVideoFromProject(id);
                });
            });
        }

        async function loadVideoFromProject(projectId) {
            try {
                const res = await fetch(`${API_BASE}/api/project/${projectId}`);
                const data = await res.json();
                if (data.video_url) {
                    showVideo(data.video_url);
                }
            } catch (err) {
                console.error('Failed to load project', err);
            }
        }

        function addProjectToRecent(jobId, title) {
            const noProjects = document.querySelectorAll('.project-item').length === 1 &&
                document.querySelector('.project-item .title')?.textContent === 'No projects yet';
            if (noProjects) {
                recentProjectsList.innerHTML = '';
            }
            const item = document.createElement('div');
            item.className = 'project-item';
            item.setAttribute('data-id', jobId);
            item.innerHTML = `
                <img class="thumbnail" src="https://via.placeholder.com/40/009ef7/white?text=V" alt="thumbnail">
                <div class="info">
                    <div class="title">${title}</div>
                    <div class="date">Just now</div>
                </div>`;
            recentProjectsList.prepend(item);
            item.addEventListener('click', function(e) {
                loadVideoFromProject(jobId);
            });
        }

        // ---------- Video Preview & Status ----------
        function showVideo(url) {
            placeholder.style.display = 'none';
            loadingSpinner.style.display = 'none';
            statusMessage.style.display = 'none';
            videoContainer.style.display = 'block';
            videoPlayer.src = url;
            videoPlayer.load();
        }

        function resetPreview() {
            placeholder.style.display = 'block';
            loadingSpinner.style.display = 'none';
            statusMessage.style.display = 'none';
            videoContainer.style.display = 'none';
            videoPlayer.src = '';
            if (pollingInterval) clearInterval(pollingInterval);
        }

        function pollJob(jobId) {
            pollingInterval = setInterval(async () => {
                try {
                    const res = await fetch(`${API_BASE}/api/status/${jobId}`);
                    const data = await res.json();
                    if (data.status === 'completed') {
                        clearInterval(pollingInterval);
                        showVideo(data.video_url);
                        addProjectToRecent(jobId, data.title || 'Untitled');
                        generateBtn.disabled = false;
                    } else if (data
